name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
      - 'release/*'
      - 'hotfix/*'
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Type check with mypy
        run: uv run mypy backend/

      - name: Test with pytest
        run: uv run pytest --cov=backend backend/tests/

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Run security scan placeholder
        run: echo "Security scan passed"

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Docker build placeholder
        run: echo "Docker build passed"
